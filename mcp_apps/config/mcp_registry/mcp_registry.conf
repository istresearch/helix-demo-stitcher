##############################################################################
# MCP Registry — pre-seeded servers
#
# Servers listed here are loaded into the registry at startup.
# Dynamic registrations (POST /v1/servers) can overwrite any entry by name.
#
# Fields per server:
#   url:        (required) Full MCP endpoint URL
#   transport:  (optional) Default: streamable_http
#   tags:       (optional) List of strings used for tags_filter in Helix config
#   headers:    (optional) Object of static headers forwarded on every tool call
##############################################################################

servers {

  # ── Demo MCP App (chart tools) ─────────────────────────────────────────
  "mcp_simple_chart" {
    url:       "http://mcp_simple_chart:3100/mcp"
    transport: "streamable_http"
    tags:      ["visualization", "charts", "demo"]
  }

  # ── Demo mapping server ─────────────────────────────────────────
  "mapping_server" {
    url:       "http://host.docker.internal:3132/mcp"
    transport: "streamable_http"
    tags:      ["gis", "mapping", "geocoding"]
  }

  # Localhost port scan — unreachable from Docker (commented out) ──
  # These entries use host.docker.internal which works for the registry
  # to reach services on the host, but DOES NOT work for helix-a
  # (running in a different Docker stack) to reach them.
  #
  # If you have services running on your host machine's ports, uncomment
  # the entries below. Services running inside Docker should use internal
  # service names instead (like mcp_simple_chart:3132 above).

  "port-3099" {
    url:       "http://host.docker.internal:3099/mcp"
    transport: "streamable_http"
    tags:      ["host", "external"]
  }

  "port-3100" {
    url:       "http://host.docker.internal:3100/mcp"
    transport: "streamable_http"
    tags:      ["host", "external"]
  }

