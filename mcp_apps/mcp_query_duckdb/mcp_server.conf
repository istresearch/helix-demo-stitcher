app {

  logging {
    config.file: "./config/logging.yaml"
    config.file: ${?LOG_CONFIG_FILE}

    level: "INFO"
    level: ${?LOG_LEVEL}
  }

  http {
    server {
      bind.address: "0.0.0.0"
      bind.address: ${?HTTP_SERVER_BIND_ADDRESS}

      port: 3000
      port: ${?HTTP_SERVER_PORT}
    }
  }

  mock_data {
    url: "http://localhost:8080"
  }

  sqlite_db {
    file.path: "./data/demo.duckdb"
    file.path: ${?SQLITE_DB_FILE_PATH}

    query_timeout_seconds: 10
    query_timeout_seconds: ${?SQLITE_QUERY_TIMEOUT_SECONDS}
    
    # Context window limit in characters (default ~100KB ≈ 25k tokens)
    # Adjust based on your LLM's context window size
    max_context_size: 100000
    max_context_size: ${?SQLITE_MAX_CONTEXT_SIZE}
  }
}
