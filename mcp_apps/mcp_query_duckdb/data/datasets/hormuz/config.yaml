dataset:
  name: hormuz
  description: Strait of Hormuz - Telecommunications Data
  region: Middle East / Persian Gulf
  countries:
    - Iran
    - UAE
    - Oman

generation:
  cdr_count_per_country: 100
  seed: 42
  maid_location_variance_m: 100        # ±100 meters from CDR location
  maid_time_variance_s: 60             # ±60 seconds from CDR time
  expected_high_confidence_connections: "70-90%"

tables:
  - name: cdr
    description: Call Detail Records - Telecommunications events
    record_count: 300                  # 3 countries × 100 records

  - name: maid
    description: Mobile Advertising IDs - Device location pings
    record_count: 450-600              # 1-3 per CDR record

  - name: connections_with_confidence
    description: Links between MAID and CDR with confidence scores
    record_count: 450-600

data_schema:
  cdr:
    - callingNumber VARCHAR
    - calledNumber VARCHAR
    - IMSI VARCHAR
    - eventTime VARCHAR
    - recordType VARCHAR (VOICE, SMS, DATA)
    - LAT DOUBLE
    - LON DOUBLE
    - CGI VARCHAR
    - MCC VARCHAR
    - MNC VARCHAR
    - LAC VARCHAR
    - CID VARCHAR

  maid:
    - ID VARCHAR (UUID)
    - ID_TYPE VARCHAR (AAID, IDFA)
    - TIMESTAMP VARCHAR
    - LATITUDE DOUBLE
    - LONGITUDE DOUBLE
    - DEVICE_MAKE VARCHAR
    - DEVICE_MODEL VARCHAR
    - DEVICE_OS VARCHAR (iOS, Android, HarmonyOS)
    - DERIVED_COUNTRY VARCHAR (Iran, UAE, Oman)

  connections_with_confidence:
    - maid_id VARCHAR
    - phone_number VARCHAR
    - distance DOUBLE (meters)
    - maid_timestamp VARCHAR
    - cdr_timestamp VARCHAR
    - confidence VARCHAR (high, medium, low)

