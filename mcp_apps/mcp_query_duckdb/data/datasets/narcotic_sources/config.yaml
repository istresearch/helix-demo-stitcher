dataset:
  name: narcotic_sources
  description: Narcotic Sources - Telecommunications Trafficking Data
  region: Global / Major Narcotic Production & Trafficking Routes
  countries:
    - Colombia
    - Mexico
    - Afghanistan
    - Peru
    - Myanmar
    - Bolivia

generation:
  cdr_count_per_country: 100
  seed: 42
  maid_location_variance_m: 150        # ±150 meters from CDR location (trafficking areas)
  maid_time_variance_s: 120            # ±120 seconds from CDR time (trafficking communication patterns)
  expected_high_confidence_connections: "65-85%"

tables:
  - name: cdr
    description: Call Detail Records - Telecommunications events in narcotic trafficking networks
    record_count: 600                  # 6 countries × 100 records

  - name: maid
    description: Mobile Advertising IDs - Device location pings in trafficking areas
    record_count: 900-1200             # 1-3 per CDR record

  - name: connections_with_confidence
    description: Links between MAID and CDR with confidence scores
    record_count: 900-1200

data_schema:
  cdr:
    - callingNumber VARCHAR
    - calledNumber VARCHAR
    - IMSI VARCHAR
    - eventTime VARCHAR
    - recordType VARCHAR (VOICE, SMS, DATA)
    - LAT DOUBLE
    - LON DOUBLE
    - CGI VARCHAR
    - MCC VARCHAR
    - MNC VARCHAR
    - LAC VARCHAR
    - CID VARCHAR

  maid:
    - ID VARCHAR (UUID)
    - ID_TYPE VARCHAR (AAID, IDFA)
    - TIMESTAMP VARCHAR
    - LATITUDE DOUBLE
    - LONGITUDE DOUBLE
    - DEVICE_MAKE VARCHAR
    - DEVICE_MODEL VARCHAR
    - DEVICE_OS VARCHAR (iOS, Android, HarmonyOS)
    - DERIVED_COUNTRY VARCHAR (Colombia, Mexico, Afghanistan, Peru, Myanmar, Bolivia)

  connections_with_confidence:
    - maid_id VARCHAR
    - phone_number VARCHAR
    - distance DOUBLE (meters)
    - maid_timestamp VARCHAR
    - cdr_timestamp VARCHAR
    - confidence VARCHAR (high, medium, low)

use_cases:
  - Drug trafficking network analysis
  - Communication pattern identification
  - Geographic hotspot detection
  - Cross-border trafficking route mapping
  - Temporal analysis of trafficking communications

