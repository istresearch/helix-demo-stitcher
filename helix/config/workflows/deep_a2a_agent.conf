workflow {

  name: "deep_a2a_agent"
  description: "General-purpose assistant that delegates weather and currency queries to Helix-B."

  # Expose this workflow via the A2A endpoint
  a2a {
    tags: ["general", "multi-agent"]
    examples: [
      "What is the weather in Paris?",
      "Convert 500 USD to EUR",
      "Write me a short story about a robot"
    ]
  }

  module_dir: "../chat_examples"
  agent_workflow: "workflow.langgraph.workflows.deep_a2a_agent.deep_a2a_agent.DeepA2AAgent"

  http_clients: {
    default_http_client: {
      verify_ssl: true
      verify_ssl: ${?CLIENT_VERIFY_SSL}
    }
  }

  persistence {
    state_storage {
      type: "memory"
      type: ${?STATE_STORAGE_TYPE}
      enabled: true
    }
    checkpointer {
      type: "memory"
      type: ${?CHECKPOINTER_TYPE}
      enabled: true
    }
  }

  transformers: [
    { class: "workflow.langgraph.transformer.langgraph.LangGraphStreamAdapter" },
    { class: "chat_service.transformer.citations.CitationsStreamTransformer" },
    { class: "chat_service.transformer.transformer.EmptyChunkFilter" },
    { class: "workflow.langgraph.transformer.history.HistoryCaptureTransformer" }
  ]

  agent {

    supervisor {

      allowed_local_tools: ["write_todos", "think_tool"]

      llm {
        model: "gpt-oss-120b"
        model: ${?AGENT_MODEL}

        model_provider: "openai"
        model_provider: ${?AGENT_MODEL_PROVIDER}

        api_key: "sk-changeme"
        api_key: ${?AGENT_MODEL_API_KEY}

        base_url: "http://host.docker.internal:4000"
        base_url: ${?AGENT_MODEL_BASE_URL}

        request_timeout: 120
        request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

        max_retries: 2
        max_retries: ${?AGENT_MODEL_MAX_RETRIES}

        system_prompt: """
           {persona}

           {tool_write_todos.txt}

           You are Helix-A, a general-purpose AI assistant.

           # CAPABILITIES
           You do NOT have weather forecasting or currency exchange tools locally.
           For those requests, you MUST delegate to a remote agent.

           ## Remote agents
           Call list_remote_agents to discover available remote agents and their skills.
           Call send_message_to_agent to delegate work to a named remote agent.

           <Task>
           - For weather queries: delegate to the remote agent that has weather capabilities.
           - For currency exchange queries: delegate to the remote agent that has currency capabilities.
           - For general questions, writing, or tasks you can handle locally: answer directly.
           - For complex requests that need both weather AND currency: call list_remote_agents first,
             plan your steps with write_todos, then delegate each step to the appropriate agent.
           </Task>

           IMPORTANT: Never tell the user that weather or currency capabilities are unavailable.
           Always check remote agents first using list_remote_agents.
           Never delegate a task back to an agent that originally sent you this request.

           Use the think_tool before returning to the user to verify all parts of the request are fulfilled.

           The current date and time is {current_datetime}.
          """

        model_temperature: 0.0
        model_temperature: ${?AGENT_MODEL_TEMPERATURE}

        disable_stream: false
        disable_stream: ${?AGENT_DISABLE_STREAM}

        http_client: "default_http_client"
      }

      citations {
        enabled: false
      }
    }

    # No local subagents on Helix-A for this demo

    # -------------------------------------------------------------------------
    # Remote A2A agents — discovered via the registry at startup
    # The registrar populates the registry with Helix-B on startup.
    # -------------------------------------------------------------------------
    remote_agents {
      static: []

      registry {
        enabled: true
        enabled: ${?A2A_REGISTRY_ENABLED}

        url: "http://registry:8100"
        url: ${?A2A_REGISTRY_URL}

        # Only pull agents tagged "helix" so Helix-A doesn't discover leaf agents directly
        tags_filter: ["helix"]
      }

      timeout_seconds: 120
      timeout_seconds: ${?A2A_AGENT_TIMEOUT}

      max_retries: 3
    }
  }
}
