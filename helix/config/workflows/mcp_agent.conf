# Demo MCP agent workflow.
# Wires the mcp_simple_chart MCP App server and (optionally) the MCP registry.
#
# When running from demo/helix, set:
#   MCP_SIMPLE_CHART_URL=http://host.docker.internal:3131/mcp
#   MCP_REGISTRY_URL=http://host.docker.internal:9000

workflow {

  name: "mcp_agent"
  description: "Demo: ReAct agent with interactive chart tools (MCP Apps)."

  module_dir: "../chat_examples"
  agent_workflow: "workflow.langgraph.workflows.mcp_agent.mcp_agent.McpAgent"

  http_clients: {
    default_http_client: {
      verify_ssl: false
      verify_ssl: ${?CLIENT_VERIFY_SSL}
    }
  }

  persistence {
    state_storage {
      type: "memory"
      type: ${?STATE_STORAGE_TYPE}
      enabled: true
    }
    checkpointer {
      type: "memory"
      type: ${?CHECKPOINTER_TYPE}
      enabled: true
    }
  }

  transformers: [
    { class: "workflow.langgraph.transformer.langgraph.LangGraphStreamAdapter" },
    { class: "chat_service.transformer.citations.CitationsStreamTransformer" },
    { class: "chat_service.transformer.transformer.EmptyChunkFilter" },
    { class: "workflow.langgraph.transformer.history.HistoryCaptureTransformer" }
  ]

  agent {
    re_act {

      llm {
        model: "default"
        model: ${?AGENT_MODEL}

        model_provider: "openai"
        model_provider: ${?AGENT_MODEL_PROVIDER}

        api_key: "sk-changeme"
        api_key: ${?AGENT_MODEL_API_KEY}

        base_url: "http://host.docker.internal:4000"
        base_url: ${?AGENT_MODEL_BASE_URL}

        request_timeout: 120
        request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

        max_retries: 2
        max_retries: ${?AGENT_MODEL_MAX_RETRIES}

        system_prompt: """
          {persona}

          You are a helpful data-visualization assistant.
          You have access to chart-generating tools that produce interactive
          visual components displayed directly in the conversation.

          # CHART RULES
          - When the user asks for a chart, graph, or visualization, you MUST
            call the appropriate chart tool (generate_bar_chart,
            generate_line_chart, generate_pie_chart, etc.).
          - NEVER describe what a chart would look like in text. Always call
            the tool to render the actual interactive chart.
          - Each new chart request requires a new tool call — never reuse a
            prior result to answer a different question.
          - After calling a chart tool, briefly describe what the chart shows
            in one or two sentences.
          """

        model_temperature: 0.0
        model_temperature: ${?AGENT_MODEL_TEMPERATURE}

        disable_stream: false
        disable_stream: ${?AGENT_DISABLE_STREAM}

        http_client: "default_http_client"
      }

      allowed_local_tools: ["think_tool"]

      mcp {
        enabled: true
        enabled: ${?AGENT_MCP_ENABLED}

        connections {
          "mcp_simple_chart": {
            transport: "streamable_http"
            http_client: "default_http_client"
            url: "http://host.docker.internal:3131/mcp"
            url: ${?MCP_SIMPLE_CHART_URL}
          }
        }

        registry {
          enabled: true
          enabled: ${?MCP_REGISTRY_ENABLED}

          url: "http://host.docker.internal:9000"
          url: ${?MCP_REGISTRY_URL}
        }

        allowed_tools: ["*"]
      }
    }
  }

  citations {
    enabled: true
    enabled: ${?AGENT_CITATIONS_ENABLED}

    cited_external_tools: ["*"]
    cited_local_tools: []
  }
}
