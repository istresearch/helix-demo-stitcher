# deep_wired — full-capability demo workflow
#
# Combines the capabilities of:
#   - deep_agent:     supervisor + story_writer/editor subagents + file tools
#   - mcp_agent:      interactive chart visualization via MCP tools
#   - deep_a2a_agent: A2A remote agents (weather, currency)
#
# Configuration notes:
#   - MCP is disabled by default. Set AGENT_MCP_ENABLED=true and
#     mcp_simple_chart_URL to point at the mcp_simple_chart server (demo/mcp_apps).
#   - A2A remote agents are disabled by default. Set A2A_REGISTRY_ENABLED=true
#     and A2A_REGISTRY_URL, or add static URLs via A2A_WEATHER_AGENT_URL and
#     A2A_CURRENCY_AGENT_URL, to wire in the demo/a2a leaf agents.

workflow {

  name: "deep_wired"
  description: "Full-capability agent: creative sub-agents, MCP chart tools, and A2A remote agents."

  a2a {
    tags: ["general", "multi-agent", "mcp", "visualization"]
    examples: [
      "Write a short story about a robot and show me a bar chart of its daily tasks",
      "What is the weather in Paris and convert 100 EUR to USD?",
      "Generate a pie chart of the following data: cats 40%, dogs 35%, birds 25%"
    ]
  }

  module_dir: "../chat_examples"
  agent_workflow: "workflow.langgraph.workflows.deep_a2a_agent.deep_a2a_agent.DeepA2AAgent"

  http_clients: {
    default_http_client: {
      verify_ssl: false
      verify_ssl: ${?CLIENT_VERIFY_SSL}
    }
  }

  persistence {
    state_storage {
      type: "memory"
      type: ${?STATE_STORAGE_TYPE}
      enabled: true
    }
    checkpointer {
      type: "memory"
      type: ${?CHECKPOINTER_TYPE}
      enabled: true
    }
  }

  transformers: [
    { class: "workflow.langgraph.transformer.langgraph.LangGraphStreamAdapter" },
    { class: "chat_service.transformer.citations.CitationsStreamTransformer" },
    { class: "chat_service.transformer.transformer.EmptyChunkFilter" },
    { class: "workflow.langgraph.transformer.history.HistoryCaptureTransformer" }
  ]

  agent {

    supervisor {

      allowed_local_tools: ["write_todos", "ls", "read_file", "write_file", "edit_file", "think_tool"]

      mcp {
        enabled: true
        enabled: ${?AGENT_MCP_ENABLED}

        connections {
          "helix_maps": {
            transport: "streamable_http"
            http_client: "default_http_client"
            url: "http://host.docker.internal:3132/mcp"
          }
        }

        registry {
          enabled: true
          enabled: ${?MCP_REGISTRY_ENABLED}

          url: "http://host.docker.internal:9000"
          url: ${?MCP_REGISTRY_URL}
        }

        allowed_tools: ["*"]
      }

      llm {
        model: "default"
        model: ${?AGENT_MODEL}

        model_provider: "openai"
        model_provider: ${?AGENT_MODEL_PROVIDER}

        api_key: "sk-changeme"
        api_key: ${?AGENT_MODEL_API_KEY}

        base_url: "http://host.docker.internal:4000"
        base_url: ${?AGENT_MODEL_BASE_URL}

        request_timeout: 120
        request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

        max_retries: 2
        max_retries: ${?AGENT_MODEL_MAX_RETRIES}

        system_prompt: """
           {persona}

           {tool_write_todos.txt}

           {tool_file_system.txt}

           You are a full-capability AI assistant. You can coordinate sub-agents,
           generate visualizations, and delegate to remote specialist agents.

           # YOUR CAPABILITIES

           ## Local Sub-agents
           - story_writer: Expert author for short stories and creative text.
           - editor: Professional editor who reviews stories for quality.

           ## MCP Tools
           You have direct access to tools loaded from connected MCP servers.
           Use them whenever they are relevant to the user's request.
           If a tool exists that can fulfill part of the request, you MUST call that tool.
           NEVER skip the tool and try to fulfill the request yourself if a relevant tool is available.
           If the request involves data you must never invent or hallucinate data. If a relevant tool can provide the data, you MUST call that tool to get the actual data.

           ## Remote A2A Agents (when configured)
           Call list_remote_agents to discover available remote agents.
           Call send_message_to_agent to delegate to a named agent.
           - Weather agent: real-time weather forecasts by location.
           - Currency agent: live currency exchange rates and conversions.

           ## Local Tools
           - File system tools (ls, read_file, write_file, edit_file) for managing files.
           - write_todos for planning multi-step tasks.
           - think_tool for reflection before responding.

           # DELEGATION RULES
           <Task>
           - For story writing: delegate to story_writer, then send the result to editor.
             Only return to the user after the editor approves.
           - For charts or visualizations: call the chart tool directly. NEVER describe in text.
           - For weather queries: delegate to the appropriate remote agent.
           - For currency exchange: delegate to the appropriate remote agent.
           - For file operations or general reasoning: handle directly.
           - For complex requests combining multiple capabilities:
             * Plan all steps with write_todos first.
             * Execute each step in order, delegating to the right agent.
             * Synthesize results into a single coherent response.
           </Task>

           Always plan multi-step tasks with write_todos before executing.
           Each sub-agent call has isolated context — provide complete, standalone instructions.
           Never delegate a task back to an agent that originally sent you this request.
           Use the think_tool before returning to verify all parts of the request are fulfilled.

           {citation_guidelines.txt}
           Preserve all citations received from sub-agents.

           The current date and time is {current_datetime}.
          """

        model_temperature: 0.0
        model_temperature: ${?AGENT_MODEL_TEMPERATURE}

        disable_stream: false
        disable_stream: ${?AGENT_DISABLE_STREAM}

        http_client: "default_http_client"

        ask_model_for_capabilities: true
        ask_model_for_capabilities: ${?ASK_MODEL_FOR_CAPABILITIES}
      }

      citations {
        enabled: false
      }
    }

    subagents {

      # -----------------------------------------------------------------------
      # story_writer — creative author subagent (from deep_agent)
      # -----------------------------------------------------------------------
      story_writer {

        agent_class: "workflow.langgraph.agents.default_agent.DefaultAgent"

        name: "story_writer"
        description: "A sub-agent that is an expert at authoring short stories or bodies of text."

        llm {
          model: "default"
          model: ${?AGENT_MODEL}

          model_provider: "openai"
          model_provider: ${?AGENT_MODEL_PROVIDER}

          api_key: "sk-changeme"
          api_key: ${?AGENT_MODEL_API_KEY}

          base_url: "http://host.docker.internal:4000"
          base_url: ${?AGENT_MODEL_BASE_URL}

          request_timeout: 120
          request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

          max_retries: 2
          max_retries: ${?AGENT_MODEL_MAX_RETRIES}

          system_prompt: """
             {tool_file_system.txt}

             You are an expert author. You write high quality short stories.

             When given a topic, you produce a creative and engaging short story on that topic.
             Do not exceed 200 words in the story.
             200 words is a hard limit.

             Capture your story and its title in a file with a unique name, and respond
             to the request by supplying the filename.

             Example response: 'Story is saved in file: the_three_bears.txt'
            """

          model_temperature: 0.1
          model_temperature: ${?AGENT_MODEL_TEMPERATURE}

          disable_stream: true

          http_client: "default_http_client"
        }

        allowed_local_tools: ["ls", "write_file", "think_tool"]

        citations {
          enabled: false
        }
      }

      # -----------------------------------------------------------------------
      # editor — professional story editor subagent (from deep_agent)
      # -----------------------------------------------------------------------
      editor {

        agent_class: "workflow.langgraph.agents.default_agent.DefaultAgent"

        name: "editor"
        description: "A professional editor and reviewer of short stories."

        llm {
          model: "default"
          model: ${?AGENT_MODEL}

          model_provider: "openai"
          model_provider: ${?AGENT_MODEL_PROVIDER}

          api_key: "sk-changeme"
          api_key: ${?AGENT_MODEL_API_KEY}

          base_url: "http://host.docker.internal:4000"
          base_url: ${?AGENT_MODEL_BASE_URL}

          request_timeout: 120
          request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

          max_retries: 2
          max_retries: ${?AGENT_MODEL_MAX_RETRIES}

          system_prompt: """
             {tool_file_system.txt}

             When given a short story, check that it meets these constraints:
               - The story has a clear beginning, middle, and end.
               - The story does not exceed 200 words.

             If the story meets the constraints:
               respond with "The story is well written and meets all constraints."
             If the story does not meet the constraints:
               provide specific feedback on what needs to be improved.

             Do not alter the story or return any of your own revisions.
             Only reply with feedback.

             {citation_guidelines.txt}
            """

          model_temperature: 0.1
          model_temperature: ${?AGENT_MODEL_TEMPERATURE}

          disable_stream: true

          http_client: "default_http_client"
        }

        allowed_local_tools: ["ls", "read_file", "think_tool"]

        citations {
          enabled: true
          enabled: ${?AGENT_CITATIONS_ENABLED}

          cited_external_tools: ["*"]
          cited_local_tools: []
        }
      }

      # -----------------------------------------------------------------------
      # visualization_agent — interactive chart generator via MCP (from mcp_agent)
      # Requires AGENT_MCP_ENABLED=true and a running mcp_simple_chart server.
      # -----------------------------------------------------------------------
      visualization_agent {

        agent_class: "workflow.langgraph.agents.default_agent.DefaultAgent"

        name: "visualization_agent"
        description: "Generates interactive charts and data visualizations using MCP chart tools."

        llm {
          model: "default"
          model: ${?AGENT_MODEL}

          model_provider: "openai"
          model_provider: ${?AGENT_MODEL_PROVIDER}

          api_key: "sk-changeme"
          api_key: ${?AGENT_MODEL_API_KEY}

          base_url: "http://host.docker.internal:4000"
          base_url: ${?AGENT_MODEL_BASE_URL}

          request_timeout: 120
          request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

          max_retries: 2
          max_retries: ${?AGENT_MODEL_MAX_RETRIES}

          system_prompt: """
             You are a data-visualization specialist.
             You have access to chart-generating MCP tools that produce interactive
             visual components displayed directly in the conversation.

             # CHART RULES
             - When asked for a chart, graph, or visualization, you MUST call the
               appropriate chart tool (generate_bar_chart, generate_line_chart,
               generate_pie_chart, etc.).
             - NEVER describe what a chart would look like in text.
               Always call the tool to render the actual interactive chart.
             - Each chart request requires a new tool call.
             - After calling a chart tool, briefly describe what the chart shows
               in one or two sentences.
            """

          model_temperature: 0.0
          model_temperature: ${?AGENT_MODEL_TEMPERATURE}

          disable_stream: true

          http_client: "default_http_client"
        }

        allowed_local_tools: ["think_tool"]

        mcp {
          enabled: true
          enabled: ${?AGENT_MCP_ENABLED}

          connections {
            "mcp_simple_chart": {
              transport: "streamable_http"
              http_client: "default_http_client"
              url: "http://host.docker.internal:3131/mcp"
              url: ${?MCP_SIMPLE_CHART_URL}
            }
          }

          registry {
            enabled: true
            enabled: ${?MCP_REGISTRY_ENABLED}

            url: "http://host.docker.internal:9000"
            url: ${?MCP_REGISTRY_URL}
          }

          allowed_tools: ["*"]
        }

        citations {
          enabled: true
          enabled: ${?AGENT_CITATIONS_ENABLED}

          cited_external_tools: ["*"]
          cited_local_tools: []
        }
      }
      query_builder {
        # This is the fully qualified name of the agent class
        agent_class: "workflow.langgraph.agents.default_agent.DefaultAgent"

        # This is used as the tool name when the agent is used as a sub-agent
        name: "query_builder_agent"

        # This is a tool description when the agent is used as a sub-agent
        description: "A specialized sub-agent that converts natural language requests into well-formed DuckDB queries for phone data analysis."

        llm {
          model: "gpt-oss-120b"
          model: ${?AGENT_MODEL}

          model_provider: "openai"
          model_provider: ${?AGENT_MODEL_PROVIDER}

          api_key: "sk-changeme"
          api_key: ${?AGENT_MODEL_API_KEY}

          base_url: "http://host.docker.internal:4000"
          base_url: ${?AGENT_MODEL_BASE_URL}

          system_prompt:"""
            You are a specialized DuckDB query builder for phone data analysis. Your job is to convert natural language requests into well-formed DuckDB queries.

            ## Database Schema
            {phone_data_db_schema.txt}

            ## Tables and Columns
            1. cdr table - Call Detail Records
               - Key columns: callingNumber, calledNumber, LAT, LON, eventTime, recordType, CGI, MNC, LAC, IMSI, MCC, CID

            2. connections_with_confidence table - Links between mobile devices and phone numbers
               - Key columns: maid_id, phone_number, distance, confidence, maid_timestamp, cdr_timestamp

            3. maid table - Mobile advertising IDs and location data
               - Key columns: ID, LATITUDE, LONGITUDE, "TIMESTAMP", DEVICE_MAKE, DEVICE_MODEL, DEVICE_OS
               - NOTE: TIMESTAMP is a reserved word in DuckDB, so it must be quoted as "TIMESTAMP"

            ## Example Queries for Reference

            The following queries are examples of highly successful analyst answering complex questions. These are the queries they used.
            {phone_data_example_queries.txt}

            ## DuckDB-Specific Syntax Requirements
            1. **Data Types**: Use DOUBLE instead of REAL for floating-point numbers
            2. **String Aggregation**: Use STRING_AGG(column, ',') instead of GROUP_CONCAT(column)
            3. **Date Functions**:
               - Use DATE_DIFF('unit', start_date, end_date) for date differences
               - Use DAYOFWEEK(date) instead of STRFTIME('%w', date)
            4. **Substring**: Use SUBSTRING(string, start, length) instead of SUBSTR()
            5. **Reserved Keywords**: Quote "TIMESTAMP" column when referencing it
            6. **GROUP BY Rules**: DuckDB has strict GROUP BY rules - any non-aggregated column in SELECT must be in GROUP BY or use ANY_VALUE()
               - If selecting columns that aren't grouped, use ANY_VALUE(column_name)
               - Example: SELECT group_col, ANY_VALUE(other_col), COUNT(*) FROM table GROUP BY group_col

            ## Schema Changes from SQLite Version
            - The old 'maid_phone_mapping' table has been replaced with 'connections_with_confidence'
            - New timestamp columns available: maid_timestamp, cdr_timestamp
            - Enhanced confidence scoring with 'confidence' column

            ## Your Task
            When given a user request, analyze it and build appropriate DuckDB queries:
            1. Understand what data the user wants
            2. Identify which tables and columns are needed
            3. Consider appropriate JOINs, filters, and aggregations
            4. Apply DuckDB-specific syntax (STRING_AGG, DATE_DIFF, DOUBLE casting, etc.)
            5. Ensure all non-aggregated columns in SELECT are either in GROUP BY or wrapped with ANY_VALUE()
            6. Return well-formed DuckDB queries that will answer the user's question
            7. If multiple queries are needed, provide them in logical order

            ## Response Format
            Return only the SQL query or queries, one per line. Do not include explanations or markdown formatting.
            If multiple queries are needed, separate them with semicolons and newlines.

            Focus solely on query construction - do not execute queries or explain results.
          """

          model_temperature: 0.0
          model_temperature: ${?AGENT_MODEL_TEMPERATURE}

          disable_stream: false
          disable_stream: ${?AGENT_DISABLE_STREAM}

          http_client: "default_http_client"
        }
      }

      query_executor {
        # This is the fully qualified name of the agent class
        agent_class: "workflow.langgraph.agents.default_agent.DefaultAgent"

        # This is used as the tool name when the agent is used as a sub-agent
        name: "query_executor_agent"

        # This is a tool description when the agent is used as a sub-agent
        description: "A specialized sub-agent that executes DuckDB queries and interprets results."

        llm {
          model: "gpt-oss-120b"
          model: ${?AGENT_MODEL}

          model_provider: "openai"
          model_provider: ${?AGENT_MODEL_PROVIDER}

          api_key: "sk-changeme",
          api_key: ${?AGENT_MODEL_API_KEY}

          base_url: "http://host.docker.internal:4000"
          base_url: ${?AGENT_MODEL_BASE_URL}

          system_prompt:"""
            You are a specialized DuckDB query executor and results interpreter. Your job is to execute DuckDB queries and explain the results clearly.

            ## Your Task
            When given DuckDB queries:
            1. Execute each query using the execute_sqlite_query tool (it works for DuckDB too)
            2. For complex queries, consider using analyze_duckdb_query tool for performance insights
            3. Analyze the results and identify key insights
            4. Present findings in a clear, concise manner
            5. If a query fails, analyze the error and suggest corrections
            6. Handle multiple queries in sequence if provided

            ## DuckDB-Specific Error Handling
            - **GROUP BY Errors**: If you see "column must appear in the GROUP BY clause", wrap non-grouped columns with ANY_VALUE()
            - **Data Type Errors**: DuckDB uses DOUBLE instead of REAL for floating-point numbers
            - **Function Errors**: DuckDB uses STRING_AGG() instead of GROUP_CONCAT(), DATE_DIFF() for date arithmetic
            - **Reserved Keywords**: The TIMESTAMP column must be quoted as "TIMESTAMP"
            - **Syntax Differences**: Use SUBSTRING() instead of SUBSTR(), DAYOFWEEK() instead of STRFTIME('%w')

            ## Common Error Corrections
            - Change `GROUP_CONCAT(column)` to `STRING_AGG(column, ',')`
            - Change `CAST(column AS REAL)` to `CAST(column AS DOUBLE)`
            - Change `SUBSTR(string, start, length)` to `SUBSTRING(string, start, length)`
            - Add `ANY_VALUE()` around non-grouped columns in SELECT clauses
            - Quote TIMESTAMP column as `"TIMESTAMP"`

            ## Result Presentation
            - Explain what the data shows in business terms
            - Highlight interesting patterns or anomalies in phone data analysis
            - Use tables to present structured results when appropriate
            - Focus on actionable insights from mobile device and call data
            - Interpret location data, device information, and call patterns meaningfully

            ## Phone Data Context
            - CDR data represents actual phone calls with location information
            - MAID data represents mobile device advertising IDs with location tracking
            - Connections data links phone numbers to mobile devices with confidence scores
            - High mobility patterns (50+ locations) often indicate commercial or fleet usage
            - Location clustering can reveal home, work, or frequently visited places

            ## CRITICAL
            - Only present actual query results, never example or mock data
            - If no results are returned, clearly state that
            - Be precise about what the data represents
            - If a query continues to fail after correction attempts, report the issue and move on
            - Be aware that results are limited by context window size - if a query returns too much data, suggest adding LIMIT clauses or more specific filters
          """

          model_temperature: 0.0
          model_temperature: ${?AGENT_MODEL_TEMPERATURE}

          disable_stream: false
          disable_stream: ${?AGENT_DISABLE_STREAM}

          http_client: "default_http_client"
        }

        mcp {
          enabled: true
          enabled: ${?AGENT_MCP_ENABLED}

          connections {
            "enzo": {
              "transport": "streamable_http",
              "http_client": "default_http_client",
              "url": "http://localhost:8090/mcp",
              "headers": {
                "Authorization": "{session.headers.Authorization}",
                "x-host": "{session.headers.host}",
                "x-user-sub": "{session.userinfo.sub}",
                "x-user-dn": "{session.userinfo.token.dn}",
                "x-user-email": "{session.userinfo.token.email}"
              }
            }
          }

          allowed_tools: ["execute_sqlite_query", "analyze_duckdb_query", "get_current_date"]
        }
      }
    }

    # -------------------------------------------------------------------------
    # Remote A2A agents — disabled by default
    # Enable by setting A2A_REGISTRY_ENABLED=true (registry-based discovery)
    # or by adding static agent URLs below.
    #
    # When running alongside demo/a2a, set:
    #   A2A_REGISTRY_URL=http://host.docker.internal:8100
    #   A2A_REGISTRY_ENABLED=true
    # -------------------------------------------------------------------------
    remote_agents {
      static: []

      registry {
        enabled: true
        enabled: ${?A2A_REGISTRY_ENABLED}

        url: "http://registry:8100"
        url: ${?A2A_REGISTRY_URL}

        # Only pull agents tagged "helix" so Helix-A doesn't discover leaf agents directly
        tags_filter: ["helix"]
      }

      timeout_seconds: 120
      timeout_seconds: ${?A2A_AGENT_TIMEOUT}

      max_retries: 3
    }
  }
}
