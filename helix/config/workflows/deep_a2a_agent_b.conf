workflow {

  name: "deep_a2a_agent_b"
  description: "Helix-B: assistant with weather forecasting and currency exchange via remote leaf agents."

  # Expose this workflow via the A2A endpoint so Helix-A can delegate to it
  a2a {
    tags: ["weather", "currency", "multi-agent", "helix"]
    examples: [
      "What is the weather in Tokyo?",
      "What is the exchange rate from USD to GBP?",
      "What is the weather in London and convert 200 GBP to USD?"
    ]
  }

  module_dir: "../chat_examples"
  agent_workflow: "workflow.langgraph.workflows.deep_a2a_agent.deep_a2a_agent.DeepA2AAgent"

  http_clients: {
    default_http_client: {
      verify_ssl: true
      verify_ssl: ${?CLIENT_VERIFY_SSL}
    }
  }

  persistence {
    state_storage {
      type: "memory"
      type: ${?STATE_STORAGE_TYPE}
      enabled: true
    }
    checkpointer {
      type: "memory"
      type: ${?CHECKPOINTER_TYPE}
      enabled: true
    }
  }

  transformers: [
    { class: "workflow.langgraph.transformer.langgraph.LangGraphStreamAdapter" },
    { class: "chat_service.transformer.citations.CitationsStreamTransformer" },
    { class: "chat_service.transformer.transformer.EmptyChunkFilter" },
    { class: "workflow.langgraph.transformer.history.HistoryCaptureTransformer" }
  ]

  agent {

    supervisor {

      allowed_local_tools: []

      llm {
        model: "gpt-oss-120b"
        model: ${?AGENT_MODEL}

        model_provider: "openai"
        model_provider: ${?AGENT_MODEL_PROVIDER}

        api_key: "sk-changeme"
        api_key: ${?AGENT_MODEL_API_KEY}

        base_url: "http://host.docker.internal:4000"
        base_url: ${?AGENT_MODEL_BASE_URL}

        request_timeout: 120
        request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

        max_retries: 2
        max_retries: ${?AGENT_MODEL_MAX_RETRIES}

        system_prompt: """
           You are Helix-B, an AI assistant that delegates weather and currency queries to specialist remote agents.

           Available remote agents (use send_message_to_agent directly):
           - "Weather Agent": weather forecasts and current conditions
           - "Currency Agent": currency conversion and exchange rates

           For weather queries: call send_message_to_agent("Weather Agent", <query>).
           For currency queries: call send_message_to_agent("Currency Agent", <query>).
           For both: call each agent, then synthesize the results.

           Always delegate — never answer weather or currency questions from your own knowledge.
           Never delegate back to an agent that sent you this request.

           The current date and time is {current_datetime}.
          """

        model_temperature: 0.0
        model_temperature: ${?AGENT_MODEL_TEMPERATURE}

        disable_stream: false
        disable_stream: ${?AGENT_DISABLE_STREAM}

        http_client: "default_http_client"
      }

      citations {
        enabled: false
      }
    }

    # No local subagents on Helix-B for this demo

    # -------------------------------------------------------------------------
    # Remote A2A agents — leaf agents configured statically since they are
    # co-located in the demo and do not self-register with the registry.
    # -------------------------------------------------------------------------
    remote_agents {
      static: [
        { url: "http://weather-agent:10010" },
        { url: "http://currency-agent:10000" }
      ]

      timeout_seconds: 120
      timeout_seconds: ${?A2A_AGENT_TIMEOUT}

      max_retries: 1
    }
  }
}
