workflow {

  name: "basic_agent"
  description: "A simple agent"

  module_dir: "../chat_examples"

  agent_workflow: "workflow.langgraph.workflows.basic_agent.basic_agent.BasicAgent"

  http_clients: {
    custom_http_client: {
      ca_cert_path: "/path/to/ca.crt",
      ca_cert_path: ${?CLIENT_CA_CERT_PATH}

      cert_path: "/path/to/client.crt",
      cert_path: ${?CLIENT_CERT_PATH}

      key_path: "/path/to/client.key",
      key_path: ${?CLIENT_KEY_PATH}

      verify_ssl: true,
      verify_ssl: ${?CLIENT_VERIFY_SSL}
    }

    default_http_client: {
        verify_ssl: false,
        verify_ssl: ${?CLIENT_VERIFY_SSL}
    }
  }


  persistence {

    state_storage {
      type: "memory"  # one of "memory" or "redis" or "postgres"
      type: ${?STATE_STORAGE_TYPE}

      enabled: true
      enabled: ${?STATE_STORAGE_ENABLED}

    }

    checkpointer {
      type: "memory"  # one of "memory" or "redis" or "postgres"
      type: ${?CHECKPOINTER_TYPE}

      enabled: true
      enabled: ${?CHECKPOINTER_ENABLED}

      redis {
        http_client: "default_http_client"

        host: "redis"
        host: ${?CHECKPOINTER_REDIS_HOST}

        port: 6379
        port: ${?CHECKPOINTER_REDIS_PORT}

        db: 0
        db: ${?CHECKPOINTER_REDIS_DB}

        password: ""
        password: ${?CHECKPOINTER_REDIS_PASSWORD}

        ttl_config {
          default_ttl: 1440  # in minutes, so this is 24 hours
          default_ttl: ${?CHECKPOINTER_REDIS_DEFAULT_TTL}

          refresh_on_read: true
          refresh_on_read: ${?CHECKPOINTER_REDIS_REFRESH_ON_READ}
        }
      }

      postgres {
        http_client: "default_http_client"

        host: "postgres"
        host: ${?CHECKPOINTER_POSTGRES_HOST}

        port: 5432
        port: ${?CHECKPOINTER_POSTGRES_PORT}

        db: "chat"
        db: ${?CHECKPOINTER_POSTGRES_DB}

        user: "chat"
        user: ${?CHECKPOINTER_POSTGRES_USER}

        password: "chatpassword"
        password: ${?CHECKPOINTER_POSTGRES_PASSWORD}
      }
    }
  }


  transformers: [
    {
      class: "workflow.langgraph.transformer.langgraph.LangGraphStreamAdapter"
    },
    {
      class: "chat_service.transformer.citations.CitationsStreamTransformer"
    },
    {
      class: "chat_service.transformer.transformer.EmptyChunkFilter"
    },
    {
      class: "workflow.langgraph.transformer.history.HistoryCaptureTransformer"
    }
  ]

  agent {
    re_act {
      llm {
        model: "claude-3-haiku-20240307",
        model: ${?AGENT_MODEL}

        model_provider: "openai"
        model_provider: ${?AGENT_MODEL_PROVIDER}

        api_key: "sk-changeme",
        api_key: ${?AGENT_MODEL_API_KEY}

        base_url: "http://host.docker.internal:4000"
        base_url: ${?AGENT_MODEL_BASE_URL}

        request_timeout: 120
        request_timeout: ${?AGENT_MODEL_REQUEST_TIMEOUT}

        max_retries: 2
        max_retries: ${?AGENT_MODEL_MAX_RETRIES}

        system_prompt:
          """
          {persona}

          {default_agent.txt}

          Use the tools you have available to answer the users questions. Do not make up answers.

          {citation_guidelines.txt}

          Do not rely on your internal knowledge if current data is available via tools.
          """

        model_temperature: 0.0
        model_temperature: ${?AGENT_MODEL_TEMPERATURE}

        disable_stream: false
        disable_stream: ${?AGENT_DISABLE_STREAM}

        http_client: "default_http_client"

        ask_model_for_capabilities: true
        ask_model_for_capabilities: ${?ASK_MODEL_FOR_CAPABILITIES}
      }

      allowed_local_tools: ["think_tool","ls", "read_file", "write_file", "write_todos"]

      mcp {
        enabled: false
        enabled: ${?AGENT_MCP_ENABLED}

        connections {}

        registry {
          url: "http://mcp-registry:8765"
          url: ${?MCP_REGISTRY_URL}

          refresh_interval_seconds: 60
          refresh_interval_seconds: ${?MCP_REGISTRY_REFRESH_INTERVAL}

          http_client: "default_http_client"
        }
        allowed_tools: ["*"]
      }

      citations {
        enabled: true
        enabled: ${?AGENT_CITATIONS_ENABLED}

        cited_external_tools: ["*"]
        cited_local_tools: []
      }
    }
  }
}
