##############################################################################
# Helix demo — application config
#
# Loaded via APP_CONFIG_FILE=/app/config/application.conf (see docker-compose).
# Built-in service files (logging, personas, prompts) are referenced by their
# absolute paths inside the container image. The workflows directory is
# overridden to point at demo/workflows/ mounted under /app/config/workflows.
##############################################################################

app {

  logging {
    config.file: "/usr/src/app/chat/config/logging.yaml"
    config.file: ${?LOG_CONFIG_FILE}

    level: "INFO"
    level: ${?LOG_LEVEL}
  }

  http {
    server {
      bind.address: "0.0.0.0"
      bind.address: ${?HTTP_SERVER_BIND_ADDRESS}

      port: 8000
      port: ${?HTTP_SERVER_PORT}
    }
  }

  http_clients: {
    default_client: {
      verify_ssl: true
      verify_ssl: ${?CLIENT_VERIFY_SSL}
    }
  }

  auth {
    mode: "disabled"
    mode: ${?AUTH_SERVER_MODE}

    oidc {
      http_client: "default_client"

      issuer_url: "https://auth.localhost/realms/myrealm"
      issuer_url: ${?OIDC_ISSUER_URL}

      audience: null
      audience: ${?OIDC_AUDIENCE}

      allowed_algorithms: ["RS256"]
      allowed_algorithms: ${?OIDC_ALLOWED_ALGORITHMS}
    }
  }

  personas {
    directory: "/usr/src/app/chat/config/personas"
    directory: ${?PERSONAS_DIR}

    active: "default"
    active: ${?PERSONAS_ACTIVE}
  }

  prompts {
    directory: "/usr/src/app/chat/config/prompts"
    directory: ${?PROMPTS_DIR}
  }

  # Workflows are mounted into the container at /app/config/workflows
  workflows {
    directory: "/app/config/workflows"
    directory: ${?WORKFLOWS_DIR}
  }

  uploads {
    enabled: true
    enabled: ${?UPLOADS_ENABLED}

    allowed-mime-types = [
      "application/pdf",
      "text/plain",
      "text/csv",
      "application/json",
      "image/png",
      "image/jpeg",
      "image/gif",
      "application/vnd.openxmlformats-officedocument.wordprocessingml.document",
      "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet",
      "application/vnd.openxmlformats-officedocument.presentationml.presentation"
    ]

    max-upload-size-mb = 2
  }

  # A2A Protocol endpoint — agent-to-agent communication
  a2a {
    enabled: true
    enabled: ${?A2A_ENABLED}

    name: "Helix"
    name: ${?A2A_AGENT_NAME}

    description: "Helix AI Workflow Platform"
    description: ${?A2A_AGENT_DESCRIPTION}

    version: "1.0.0"

    default_workflow: "deep_wired"
    default_workflow: ${?A2A_DEFAULT_WORKFLOW}

    public_url: "http://localhost:8000/a2a"
    public_url: ${?A2A_PUBLIC_URL}

    registry {
      enabled: true
      enabled: ${?A2A_REGISTRY_ENABLED}

      url: "http://localhost:8100"
      url: ${?A2A_REGISTRY_URL}

      api_key: ""
      api_key: ${?A2A_REGISTRY_API_KEY}

      tags: "helix"
      tags: ${?A2A_REGISTRY_TAGS}
    }
  }
}
