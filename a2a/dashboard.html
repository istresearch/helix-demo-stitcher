<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helix A2A Demo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --sidebar:   #161b27;
      --border:    #252d3d;
      --accent:    #4f8ef7;
      --accent-h:  #6aa3ff;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --green:     #22c55e;
      --red:       #ef4444;
      --amber:     #f59e0b;
      --sidebar-w: 240px;
    }

    html, body { height: 100%; overflow: hidden; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ─────────────────────────────────────── */
    #shell { display: flex; height: 100vh; }

    /* ── Sidebar ────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    #sidebar header {
      padding: 18px 16px 14px;
      border-bottom: 1px solid var(--border);
    }
    #sidebar header h1 { font-size: 13px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); }
    #sidebar header p  { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .group-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 16px 16px 6px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 9px 16px;
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      border-left: 3px solid transparent;
      transition: background .12s, border-color .12s;
      color: var(--text);
    }
    .nav-btn:hover  { background: rgba(255,255,255,.04); }
    .nav-btn.active { background: rgba(79,142,247,.1); border-left-color: var(--accent); }

    .nav-icon {
      font-size: 18px;
      line-height: 1;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .nav-info { flex: 1; overflow: hidden; }
    .nav-name { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-port { font-size: 11px; color: var(--muted); }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      background: var(--muted);
      transition: background .3s;
    }
    .status-dot.up     { background: var(--green); box-shadow: 0 0 5px var(--green); }
    .status-dot.down   { background: var(--red); }
    .status-dot.check  { background: var(--amber); }

    #sidebar footer {
      margin-top: auto;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--muted);
    }
    #sidebar footer a { color: var(--muted); text-decoration: none; }
    #sidebar footer a:hover { color: var(--accent); }

    /* ── Main area ──────────────────────────────────── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #topbar {
      height: 40px;
      min-height: 40px;
      background: var(--sidebar);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 14px;
      gap: 10px;
    }

    #current-label { font-size: 13px; font-weight: 600; }
    #current-url   { font-size: 11px; color: var(--muted); font-family: monospace; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    #open-btn {
      flex-shrink: 0;
      padding: 4px 10px;
      font-size: 11px;
      background: rgba(79,142,247,.15);
      border: 1px solid rgba(79,142,247,.35);
      border-radius: 4px;
      color: var(--accent-h);
      cursor: pointer;
      text-decoration: none;
      transition: background .12s;
    }
    #open-btn:hover { background: rgba(79,142,247,.28); }

    #frame-wrap { flex: 1; position: relative; }

    iframe {
      width: 100%; height: 100%;
      border: none;
      background: #fff;
    }

    /* placeholder shown for non-embeddable services */
    #no-embed {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    #no-embed.visible { display: flex; }
    #no-embed svg { opacity: .35; }
    #no-embed-btn {
      padding: 8px 20px;
      font-size: 13px;
      background: rgba(79,142,247,.15);
      border: 1px solid rgba(79,142,247,.35);
      border-radius: 6px;
      color: var(--accent-h);
      cursor: pointer;
      text-decoration: none;
      transition: background .12s;
    }
    #no-embed-btn:hover { background: rgba(79,142,247,.28); }

    /* overlay shown while iframe loads */
    #overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg);
      pointer-events: none;
      transition: opacity .25s;
    }
    #overlay.hidden { opacity: 0; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="shell">

  <!-- ── Sidebar ─────────────────────────────────── -->
  <nav id="sidebar">
    <header>
      <h1>Helix A2A Demo</h1>
      <p>Service dashboard</p>
    </header>

    <div class="group-label">Helix Instances</div>

    <button class="nav-btn active" data-url="http://localhost:8000/docs#/openai/chat_completions_v1_chat_completions_post" data-health="http://localhost:8000/v1/healthz" data-name="Helix-A" data-port=":8000">
      <span class="nav-icon">🅰</span>
      <div class="nav-info">
        <div class="nav-name">Helix-A</div>
        <div class="nav-port">localhost:8000</div>
      </div>
      <span class="status-dot check"></span>
    </button>

    <button class="nav-btn" data-url="http://localhost:8001/docs#/openai/chat_completions_v1_chat_completions_post" data-health="http://localhost:8001/v1/healthz" data-name="Helix-B" data-port=":8001">
      <span class="nav-icon">🅱</span>
      <div class="nav-info">
        <div class="nav-name">Helix-B</div>
        <div class="nav-port">localhost:8001</div>
      </div>
      <span class="status-dot check"></span>
    </button>

    <div class="group-label">Registry</div>

    <button class="nav-btn" data-url="http://localhost:8100/docs" data-health="http://localhost:8100/health" data-name="A2A Registry" data-port=":8100">
      <span class="nav-icon">📋</span>
      <div class="nav-info">
        <div class="nav-name">A2A Registry</div>
        <div class="nav-port">localhost:8100</div>
      </div>
      <span class="status-dot check"></span>
    </button>

    <div class="group-label">Leaf Agents</div>

    <button class="nav-btn" data-url="http://localhost:10010/.well-known/agent.json" data-health="http://localhost:10010/.well-known/agent.json" data-name="Weather Agent" data-port=":10010">
      <span class="nav-icon">🌤</span>
      <div class="nav-info">
        <div class="nav-name">Weather Agent</div>
        <div class="nav-port">localhost:10010</div>
      </div>
      <span class="status-dot check"></span>
    </button>

    <button class="nav-btn" data-url="http://localhost:10000/.well-known/agent.json" data-health="http://localhost:10000/.well-known/agent.json" data-name="Currency Agent" data-port=":10000">
      <span class="nav-icon">💱</span>
      <div class="nav-info">
        <div class="nav-name">Currency Agent</div>
        <div class="nav-port">localhost:10000</div>
      </div>
      <span class="status-dot check"></span>
    </button>

    <div class="group-label">Observability</div>

    <button class="nav-btn" data-url="http://localhost:3000" data-health="http://localhost:3000/api/public/health" data-name="Langfuse" data-port=":3000" data-no-embed="true">
      <span class="nav-icon">📊</span>
      <div class="nav-info">
        <div class="nav-name">Langfuse</div>
        <div class="nav-port">localhost:3000</div>
      </div>
      <span class="status-dot check"></span>
    </button>

    <footer>
      <a href="http://localhost:8100/v1/agents" target="_blank">Registry JSON ↗</a>
    </footer>
  </nav>

  <!-- ── Main ────────────────────────────────────── -->
  <div id="main">
    <div id="topbar">
      <span id="current-label">Helix-A</span>
      <span id="current-url">http://localhost:8000/docs#/openai/chat_completions_v1_chat_completions_post</span>
      <a id="open-btn" href="#" target="_blank">Open ↗</a>
    </div>
    <div id="frame-wrap">
      <iframe id="frame" src="http://localhost:8000/docs#/openai/chat_completions_v1_chat_completions_post" title="Helix-A"></iframe>
      <div id="overlay"><div class="spinner"></div></div>
      <div id="no-embed">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
        <span>This service cannot be embedded in an iframe.<br>Open it directly in a new tab.</span>
        <a id="no-embed-btn" href="#" target="_blank">Open ↗</a>
      </div>
    </div>
  </div>

</div>

<script>
  const frame       = document.getElementById('frame');
  const overlay     = document.getElementById('overlay');
  const noEmbed     = document.getElementById('no-embed');
  const noEmbedBtn  = document.getElementById('no-embed-btn');
  const labelEl     = document.getElementById('current-label');
  const urlEl       = document.getElementById('current-url');
  const openBtn     = document.getElementById('open-btn');
  const buttons     = document.querySelectorAll('.nav-btn');

  // ── Navigation ──────────────────────────────────────────────────────────
  function navigate(btn) {
    buttons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const url      = btn.dataset.url;
    const name     = btn.dataset.name;
    const noEmbedSvc = btn.dataset.noEmbed === 'true';

    labelEl.textContent = name;
    urlEl.textContent   = url;
    openBtn.href        = url;

    if (noEmbedSvc) {
      frame.src = 'about:blank';
      overlay.classList.add('hidden');
      noEmbed.classList.add('visible');
      noEmbedBtn.href = url;
    } else {
      noEmbed.classList.remove('visible');
      overlay.classList.remove('hidden');
      frame.src = url;
    }
  }

  frame.addEventListener('load', () => overlay.classList.add('hidden'));

  buttons.forEach(btn => btn.addEventListener('click', () => navigate(btn)));

  // ── Health checks ───────────────────────────────────────────────────────
  async function checkHealth(btn) {
    const dot = btn.querySelector('.status-dot');
    const url = btn.dataset.health;
    try {
      const resp = await fetch(url, { mode: 'no-cors', cache: 'no-store', signal: AbortSignal.timeout(3000) });
      // no-cors => opaque response, status is always 0 — any response = up
      dot.className = 'status-dot up';
    } catch {
      dot.className = 'status-dot down';
    }
  }

  function pollAll() { buttons.forEach(checkHealth); }
  pollAll();
  setInterval(pollAll, 15000);

  // ── Activate first button ───────────────────────────────────────────────
  overlay.classList.remove('hidden');
</script>
</body>
</html>
